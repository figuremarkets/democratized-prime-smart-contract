name: Build and test

on:
  pull_request:
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v5

    - name: "Install Rust"
      uses: actions-rust-lang/setup-rust-toolchain@v1
    
    - name: "Test"
      run: cargo test